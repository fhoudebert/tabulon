<!DOCTYPE html>
<html>
<head>
		<link rel="icon" href="data:,">
	<title>Camera View</title>
	<link rel="stylesheet" href="tabulon.css">
	<script>if (typeof module === 'object') { window.module = module; module = undefined; }</script>
	<script src="../node_modules/jquery/dist/jquery.js" charset="utf-8"></script>
	<script src="../browser/jocly.js" charset="utf-8"></script>
	<script type="module" src="camera-view.js"></script>
</head>
<body>
<div class="window window-gray">
	<div class="window-content camera-content">

		<section class="camera-section">
			<div class="camera-row camera-row-header">
				<label>View points</label>
				<button class="btn btn-positive btn-mini add-view-point" title="Add view point">
					<span class="icon icon-plus"></span>
				</button>
			</div>
			<ul class="view-points list-group"></ul>
		</section>

		<section class="camera-section">
			<div class="camera-row">
				<label>Spin</label>
				<div class="btn-group">
					<button id="spin-ccw" class="btn btn-default" title="Spin counter-clockwise">
						<span class="icon icon-ccw"></span>
					</button>
					<button id="spin-cw" class="btn btn-default" title="Spin clockwise">
						<span class="icon icon-cw"></span>
					</button>
					<button id="pause" class="btn btn-default" title="Pause spin">
						<span class="icon icon-pause"></span>
					</button>
				</div>
			</div>
		</section>

		<section class="camera-section">
			<div class="camera-row camera-row-header">
				<label>Speeds</label>
				<button class="btn btn-positive btn-mini add-speed" title="Add speed">
					<span class="icon icon-plus"></span>
				</button>
			</div>
			<ul class="speeds list-group"></ul>
		</section>

		<section class="camera-section">
			<div class="camera-row">
				<label>Smooth factor</label>
				<input id="kalman" class="form-control camera-kalman" type="number" step="0.001" min="0" max="1"/>
			</div>
		</section>

	</div>
	<footer class="toolbar toolbar-footer">
		<div class="toolbar-actions">
			<button id="help" class="btn btn-default pull-left">Help</button>
			<button id="button-close" class="btn btn-default pull-right"><span data-i18n="common.close">Close</span></button>
		</div>
	</footer>
</div>
</body>
</html>
