<!DOCTYPE html>
<html>

<head>
		<link rel="icon" href="data:,">
	<title>Tabulon</title>

	<!-- Stylesheets -->
	<link rel="stylesheet" href="tabulon.css">

	<!-- Javascript -->
	<script>
		if (typeof module === 'object') { window.module = module; module = undefined; }
	</script>
	<script src="../node_modules/jquery/dist/jquery.js" charset="utf-8"></script>
	<script src="../browser/jocly.js" charset="utf-8"></script>
	<script type="module" src="save-template.js"></script>
</head>

<body>
	<div class="window window-gray">

		<div class="window-content save-template">
			<form>
				<div class="form-group">
    				<label data-i18n="template.name">Template name</label>
    				<input type="text" class="form-control" placeholder="Template name" data-i18n-placeholder="template.name">
					<p data-i18n="saveTemplate.hint">Templates remembers players, view options, window size and position so you can start playing from
						a defined configuration</p>
  				</div>
			</form>
		</div>
		<footer class="toolbar toolbar-footer">
			<div class="toolbar-actions">
				<button id="button-cancel" class="btn btn-default"><span data-i18n="common.cancel">Cancel</span></button>
				<button id="button-save" class="btn btn-primary pull-right"><span data-i18n="common.save">Save</span></button>
			</div>
		</footer>
	</div>
</body>

</html>
