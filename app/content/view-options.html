<!DOCTYPE html>
<html>

<head>
		<link rel="icon" href="data:,">
	<title data-i18n="viewOptions.title">Tabulon</title>

	<!-- Stylesheets -->
	<link rel="stylesheet" href="tabulon.css">

	<!-- Javascript -->
	<script>
		if (typeof module === 'object') { window.module = module; module = undefined; }
	</script>
	<script src="../node_modules/jquery/dist/jquery.js" charset="utf-8"></script>
	<script src="../browser/jocly.js" charset="utf-8"></script>
	<script type="module" src="view-options.js"></script>
</head>

<body>
	<div class="window window-gray">

		<div class="window-content">

			<div class="view-options">
				<form>
					<div id="skin" class="form-group hidden">
						<label class="pull-left" data-i18n="view.skin">Skin</label>
						<select class="form-control pull-left"></select>
					</div>
					<div id="sounds" class="checkbox hidden">
						<label>
							<input type="checkbox"> <span data-i18n="view.sounds">Sounds</span>
						</label>
					</div>
					<div id="notation" class="checkbox hidden">
						<label>
							<input type="checkbox"> <span data-i18n="view.notation">Notation</span>
						</label>
					</div>
					<div id="showMoves" class="checkbox hidden">
						<label>
							<input type="checkbox"> <span data-i18n="view.showMoves">Show moves</span>
						</label>
					</div>
					<div id="autoComplete" class="checkbox hidden">
						<label>
							<input type="checkbox"> <span data-i18n="view.autoComplete">Auto-complete moves</span>
						</label>
					</div>
					<div id="anaglyph" class="checkbox hidden">
						<label>
							<input type="checkbox"> <span data-i18n="view.anaglyph">Anaglyph view</span>
						</label>
					</div>
					<div id="viewAs" class="form-group hidden">
						<label class="pull-left" data-i18n="view.viewAs">View as</label>
						<select class="form-control pull-left"></select>
					</div>
				</form>
			</div>
		</div>
		<footer class="toolbar toolbar-footer">
			<div class="toolbar-actions">
				<button id="button-close" class="btn btn-default pull-right"><span data-i18n="common.close">Close</span></button>
			</div>
		</footer>
	</div>
</body>

</html>
